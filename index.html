<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS Creations | Premium Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>ZS <span class="highlight">Creations</span></h1>
        <p>Handcrafted with Love</p>
    </header>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterProduct('all')">All Products</button>
        <button class="filter-btn" onclick="filterProduct('candles')">Candles</button>
        <button class="filter-btn" onclick="filterProduct('jewelry')">Jewelry</button>
        <button class="filter-btn" onclick="filterProduct('decor')">Home Decor</button>
    </div>

    <section class="products" id="product-grid">
        <div class="product-card candles">
            <img src="zahida.1.jpeg" alt="Scented Candle">
            <h3>Nikah-Nama Box</h3>
            <p>₹1699</p>
            <button class="buy-btn">Order on WhatsApp</button>
        </div>

        <div class="product-card jewelry">
            <img src="zahida.2.jpeg" alt="Necklace">
            <h3>Handmade Necklace</h3>
            <p>₹499</p>
            <button class="buy-btn">Order on WhatsApp</button>
        </div>

        <div class="product-card decor">
            <img src="zahida.3.jpeg" alt="Wall Hanging">
            <h3>Macrame Wall Hanging</h3>
            <p>₹899</p>
            <button class="buy-btn">Order on WhatsApp</button>
        </div>

        <div class="product-card candles">
            <img src="zahida.1.jpeg" alt="Rose Candle">
            <h3>Rose Petal Candle</h3>
            <p>₹350</p>
            <button class="buy-btn">Order on WhatsApp</button>
        </div>
        <div class="product-card decor">
            <img src="zahida.2.jpeg" alt="Nikah Box Premium">
            <h3>Nikah-Nama Premium Box</h3>
            <p>₹1899</p>
            <button class="buy-btn">Order on WhatsApp</button>
        </div>

        <div class="product-card candles">
            <img src="zahida.3.jpeg" alt="Candle Design">
            <h3>Handmade Decorative Candle</h3>
            <p>₹350</p>
            <button class="buy-btn">Order on WhatsApp</button>
        </div>

        <div class="product-card jewelry">
            <img src="zahida.4.jpeg" alt="Jewelry Item">
            <h3>Customized Bridal Set</h3>
            <p>₹599</p>
            <button class="buy-btn">Order on WhatsApp</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
