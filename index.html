<h2 class="section-title">Shop by Category</h2>
<div class="category-container">
    <div class="category-card" onclick="showCategory('Nikah Nama Box', nikahProducts)">
        <div class="single-cat-img"><img src="zahida.1.jpeg"></div>
        <div class="cat-name">Nikah Nama Box</div>
    </div>

    <div class="category-card" onclick="showCategory('Quran Rehal', rehalProducts)">
        <div class="single-cat-img"><img src="zahida.2.jpeg"></div>
        <div class="cat-name">Quran Rehal</div>
    </div>

    <div class="category-card" onclick="showCategory('Jewelry', jewelryProducts)">
        <div class="single-cat-img"><img src="zahida.5.jpeg"></div>
        <div class="cat-name">Jewelry & More</div>
    </div>

    <div class="category-card" onclick="showCategory('Resin Art', resinProducts)">
        <div class="single-cat-img"><img src="nikah.1.jpeg"></div>
        <div class="cat-name">Resin Art</div>
    </div>

    <div class="category-card" onclick="showCategory('Custom Gifts', customGifts)">
        <div class="single-cat-img"><img src="nikah.2.jpeg"></div>
        <div class="cat-name">Customized Gifts</div>
    </div>

    <div class="category-card" onclick="showCategory('Hair Accessories', hairAccProducts)">
        <div class="single-cat-img"><img src="zahida.6.jpeg"></div>
        <div class="cat-name">Hair Accessories</div>
    </div>

    <div class="category-card" onclick="showCategory('Home Decor', decorProducts)">
        <div class="single-cat-img"><img src="zahida.4.jpeg"></div>
        <div class="cat-name">Home Decor</div>
    </div>

    <div class="category-card" onclick="showCategory('Candles', candleProducts)">
        <div class="single-cat-img"><img src="zahida.3.jpeg"></div>
        <div class="cat-name">Premium Candles</div>
    </div>

    <div class="category-card" onclick="showCategory('Keychains', keychainProducts)">
        <div class="single-cat-img"><img src="zahida.5.jpeg"></div>
        <div class="cat-name">Keychains</div>
    </div>

    <div class="category-card" onclick="showCategory('Specials', specialProducts)">
        <div class="single-cat-img"><img src="zahida.1.jpeg"></div>
        <div class="cat-name">Special Collection</div>
    </div>
</div>

<script>
    // Slider Logic
    const sliderImgs = ['zahida.1.jpeg', 'zahida.4.jpeg', 'zahida.5.jpeg'];
    let sliderIdx = 0;
    setInterval(() => {
        sliderIdx = (sliderIdx + 1) % sliderImgs.length;
        document.getElementById('hero-slider').style.backgroundImage = `url('${sliderImgs[sliderIdx]}')`;
    }, 3000);

    // Data Lists (Maine sabke liye placeholders bana diye hain)
    const nikahProducts = [{src: 'zahida.1.jpeg', price: '₹1499', name: 'Premium Nikah Box'}];
    const rehalProducts = [{src: 'zahida.2.jpeg', price: '₹1200', name: 'Wooden Rehal'}];
    const jewelryProducts = [{src: 'zahida.5.jpeg', price: '₹450', name: 'Crystal Earrings'}];
    const resinProducts = [{src: 'nikah.1.jpeg', price: '₹899', name: 'Resin Clock'}];
    const customGifts = [{src: 'nikah.2.jpeg', price: '₹999', name: 'Photo Frame'}];
    const hairAccProducts = [{src: 'zahida.6.jpeg', price: '₹250', name: 'Pearl Clip'}];
    const decorProducts = [{src: 'zahida.4.jpeg', price: '₹1500', name: 'Wall Hanging'}];
    const candleProducts = [{src: 'zahida.3.jpeg', price: '₹350', name: 'Scented Candle'}];
    const keychainProducts = [{src: 'zahida.5.jpeg', price: '₹150', name: 'Resin Keychain'}];
    const specialProducts = [{src: 'zahida.1.jpeg', price: '₹2000', name: 'Gift Combo'}];

    // Common Display Function
    function showCategory(title, products) {
        const stack = document.getElementById('product-stack');
        document.getElementById('cat-title').innerText = title;
        stack.innerHTML = ''; 

        products.forEach(item => {
            stack.innerHTML += `
                <div class="product-item">
                    <img src="${item.src}">
                    <div class="product-info">
                        <h3>${item.name}</h3>
                        <p class="price-tag">${item.price}</p>
                        <button class="wa-btn" onclick="sendWA('${item.name}', '${item.price}')">Order on WhatsApp</button>
                    </div>
                </div>
            `;
        });

        document.getElementById('gallery-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeGallery() {
        document.getElementById('gallery-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function sendWA(name, price) {
        window.open(`https://wa.me/917478471531?text=I want to order ${name} for ${price}`, '_blank');
    }
</script>
