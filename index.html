<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS Creations | Premium Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body id="main-body">

    <header>
        <h1>ZS <span class="highlight">Creations</span></h1>
        <p>Handcrafted with Love</p>
    </header>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterProduct('all', '#fef6fb')">All</button>
        <button class="filter-btn" onclick="filterProduct('candles', '#fff9e6')">Candles</button>
        <button class="filter-btn" onclick="filterProduct('jewelry', '#e6f3ff')">Jewelry</button>
        <button class="filter-btn" onclick="filterProduct('decor', '#f0e6ff')">Home Decor</button>
    </div>

    <section class="products" id="product-grid">
        
        <div class="product-card decor">
            <div class="image-collage">
                <img src="zahida.1.jpeg" alt="View 1">
                <img src="zahida.2.jpeg" alt="View 2">
                <img src="zahida.3.jpeg" alt="View 3">
                <img src="zahida.4.jpeg" alt="View 4">
            </div>
            <h3>Lavender Mirror Box</h3>
            <p>₹1699</p>
            <button class="buy-btn" onclick="location.href='https://wa.me/91XXXXXXXXXX?text=I want to buy Lavender Mirror Box'">Order on WhatsApp</button>
        </div>

        <div class="product-card jewelry">
            <img src="zahida.5.jpeg" alt="Jewelry" class="single-img">
            <h3>Handmade Necklace</h3>
            <p>₹499</p>
            <button class="buy-btn" onclick="location.href='https://wa.me/91XXXXXXXXXX?text=I want to buy Necklace'">Order on WhatsApp</button>
        </div>

        <div class="product-card candles">
            <img src="zahida.6.jpeg" alt="Candle" class="single-img">
            <h3>Premium Scented Candle</h3>
            <p>₹299</p>
            <button class="buy-btn" onclick="location.href='https://wa.me/91XXXXXXXXXX?text=I want to buy Candle'">Order on WhatsApp</button>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
