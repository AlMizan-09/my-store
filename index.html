<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Product Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #333; color: #fff; padding: 1rem; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: #fff; margin: 10px; padding: 15px; width: 250px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .card img { max-width: 100%; border-radius: 5px; height: 200px; object-fit: cover; }
        .card h3 { font-size: 1.2rem; margin: 10px 0; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.1rem; }
        .buy-btn { display: inline-block; background: #25D366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Store</h1>
</header>

<div class="container">
    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product 1">
        <h3>Product Ka Naam</h3>
        <p class="price">₹499</p>
        <a href="https://wa.me/91XXXXXXXXXX?text=Mujhe Product 1 chahiye" class="buy-btn">WhatsApp Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product 2">
        <h3>Product Ka Naam</h3>
        <p class="price">₹799</p>
        <a href="https://wa.me/91XXXXXXXXXX?text=Mujhe Product 2 chahiye" class="buy-btn">WhatsApp Order</a>
    </div>
</div>

</body>
</html>
